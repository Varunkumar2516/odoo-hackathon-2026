<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps — Fuel & Expenses</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    .nav-item.active { background: #FFFBEB; color: #D97706; border-left: 4px solid #D97706; }
    .premium-card { background: #ffffff; border: 1px solid #E2E8F0; border-radius: 16px; }
  </style>
</head>
<body class="flex min-h-screen text-slate-700">

  <!-- Sidebar -->
  <aside class="w-64 border-r bg-white flex flex-col">
    <div class="p-6 border-b font-bold text-xl text-slate-900">TransitOps</div>
    <nav class="p-4 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-500 hover:bg-slate-50">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="fuel_expenses.html" class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm">
        <i data-lucide="fuel" class="w-4 h-4"></i> Fuel & Expenses
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-8 space-y-8">
    <header class="flex justify-between items-center">
      <h2 class="text-2xl font-bold text-slate-900">Fuel & Expense Management</h2>
      <div class="space-x-3">
        <button onclick="document.getElementById('fuelModal').classList.remove('hidden')" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">+ Log Fuel</button>
        <button onclick="document.getElementById('expenseModal').classList.remove('hidden')" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">+ Add Expense</button>
      </div>
    </header>

    <!-- Tables -->
    <section class="premium-card p-6">
      <h3 class="text-xs font-bold uppercase text-slate-400 mb-4">Fuel Logs</h3>
      <table class="w-full text-sm text-left">
        <thead class="text-slate-400 uppercase bg-slate-50">
          <tr><th class="p-3">Vehicle</th><th>Date</th><th>Liters</th><th>Cost</th></tr>
        </thead>
        <tbody id="fuelTableBody" class="divide-y"></tbody>
      </table>
    </section>

    <section class="premium-card p-6">
      <h3 class="text-xs font-bold uppercase text-slate-400 mb-4">Other Expenses</h3>
      <table class="w-full text-sm text-left">
        <thead class="text-slate-400 uppercase bg-slate-50">
          <tr><th class="p-3">Trip</th><th>Vehicle</th><th>Type</th><th>Amount</th></tr>
        </thead>
        <tbody id="expenseTableBody" class="divide-y"></tbody>
      </table>
    </section>
  </main>

  <!-- Modals and Scripts would go here to handle form submissions and data fetching -->
  <script>
    lucide.createIcons();
    const API_BASE = "http://127.0.0.1:8000";

    async function loadData() {
      // Fetch Fuel
      const fRes = await fetch(`${API_BASE}/fuel-expenses/fuel`);
      const fuel = await fRes.json();
      document.getElementById('fuelTableBody').innerHTML = fuel.map(f => 
        `<tr><td class="p-3">${f.vehicle?.registration_number || 'N/A'}</td><td>${f.date}</td><td>${f.liters_filled} L</td><td>${f.fuel_cost}</td></tr>`
      ).join('');

      // Fetch Expenses
      const eRes = await fetch(`${API_BASE}/fuel-expenses/expenses`);
      const exp = await eRes.json();
      document.getElementById('expenseTableBody').innerHTML = exp.map(e => 
        `<tr><td class="p-3">${e.trip_id || '—'}</td><td>${e.vehicle?.registration_number || 'N/A'}</td><td>${e.expense_type}</td><td>${e.amount}</td></tr>`
      ).join('');
    }
    loadData();
  </script>
</body>
</html>
