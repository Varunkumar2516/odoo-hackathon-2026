<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps — Fuel & Expenses</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">

  <!-- Action Bar -->
  <div class="flex justify-end gap-3 mb-6">
    <button onclick="document.getElementById('fuelModal').classList.remove('hidden')" class="bg-amber-500 text-white px-4 py-2 rounded-lg font-semibold">+ Log Fuel</button>
    <button onclick="document.getElementById('expenseModal').classList.remove('hidden')" class="bg-amber-500 text-white px-4 py-2 rounded-lg font-semibold">+ Add Expense</button>
  </div>

  <!-- Tables Section -->
  <div class="space-y-8">
    <div class="bg-white p-6 rounded-lg shadow">
      <h3 class="font-bold mb-4">Fuel Logs</h3>
      <table class="w-full text-sm text-left">
        <thead class="bg-gray-50 text-gray-400 uppercase">
          <tr><th class="p-3">Vehicle</th><th>Date</th><th>Liters</th><th>Cost</th></tr>
        </thead>
        <tbody id="fuelTableBody" class="divide-y"></tbody>
      </table>
    </div>
  </div>

  <!-- MODALS -->
  <!-- Fuel Modal -->
  <div id="fuelModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
    <form id="fuelForm" class="bg-white p-6 rounded-lg w-80 space-y-3">
      <h3 class="font-bold">Log Fuel</h3>
      <input type="number" id="fVehicleId" placeholder="Vehicle ID" class="w-full border p-2 rounded" required>
      <input type="date" id="fDate" class="w-full border p-2 rounded" required>
      <input type="number" step="0.01" id="fLiters" placeholder="Liters" class="w-full border p-2 rounded" required>
      <input type="number" step="0.01" id="fCost" placeholder="Cost" class="w-full border p-2 rounded" required>
      <button type="submit" class="bg-amber-500 text-white w-full py-2 rounded">Save</button>
      <button type="button" onclick="document.getElementById('fuelModal').classList.add('hidden')" class="w-full text-gray-500">Cancel</button>
    </form>
  </div>

  <!-- Expense Modal -->
  <div id="expenseModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
    <form id="expenseForm" class="bg-white p-6 rounded-lg w-80 space-y-3">
      <h3 class="font-bold">Add Expense</h3>
      <input type="text" id="eTripId" placeholder="Trip ID" class="w-full border p-2 rounded">
      <input type="number" id="eVehicleId" placeholder="Vehicle ID" class="w-full border p-2 rounded" required>
      <select id="eType" class="w-full border p-2 rounded">
        <option value="Toll">Toll</option>
        <option value="Maintenance Linked">Maintenance Linked</option>
        <option value="Other">Other</option>
      </select>
      <input type="number" step="0.01" id="eAmount" placeholder="Amount" class="w-full border p-2 rounded" required>
      <input type="date" id="eDate" class="w-full border p-2 rounded" required>
      <button type="submit" class="bg-amber-500 text-white w-full py-2 rounded">Save</button>
      <button type="button" onclick="document.getElementById('expenseModal').classList.add('hidden')" class="w-full text-gray-500">Cancel</button>
    </form>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8080/fuel-expenses";

    async function fetchData() {
      const res = await fetch(`${API_BASE}/fuel`);
      const logs = await res.json();
      document.getElementById('fuelTableBody').innerHTML = logs.map(f => 
        `<tr><td class="p-3">${f.vehicle_id}</td><td>${f.date}</td><td>${f.liters_filled}</td><td>${f.fuel_cost}</td></tr>`
      ).join('');
    }

    // Submit Fuel
    document.getElementById('fuelForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await fetch(`${API_BASE}/fuel`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          vehicle_id: parseInt(document.getElementById('fVehicleId').value),
          date: document.getElementById('fDate').value,
          liters_filled: parseFloat(document.getElementById('fLiters').value),
          fuel_cost: parseFloat(document.getElementById('fCost').value)
        })
      });
      location.reload();
    });

    // Submit Expense
    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await fetch(`${API_BASE}/expenses`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          trip_id: document.getElementById('eTripId').value || null,
          vehicle_id: parseInt(document.getElementById('eVehicleId').value),
          expense_type: document.getElementById('eType').value,
          amount: parseFloat(document.getElementById('eAmount').value),
          date: document.getElementById('eDate').value
        })
      });
      location.reload();
    });

    fetchData();
  </script>
</body>
</html>
